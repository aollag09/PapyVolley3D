<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle for depth -->
  <defs>
    <radialGradient id="volleyGrad" cx="35%" cy="35%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8e8e8;stop-opacity:1" />
    </radialGradient>
  </defs>

  <!-- Main sphere -->
  <circle cx="100" cy="100" r="95" fill="url(#volleyGrad)" stroke="#ddd" stroke-width="1"/>

  <!-- Yellow/Gold panels -->
  <path d="M 100 15 Q 140 50 140 100 Q 140 140 100 165 Q 100 130 100 100 Z" fill="#FFC72C" opacity="0.9"/>
  <path d="M 100 15 Q 60 50 60 100 Q 60 140 100 165 Q 100 130 100 100 Z" fill="#FF6B6B" opacity="0.85"/>

  <!-- Characteristic volleyball curves (white lines) -->
  <ellipse cx="100" cy="100" rx="70" ry="25" fill="none" stroke="#ffffff" stroke-width="2.5" opacity="0.8"/>
  <ellipse cx="100" cy="100" rx="70" ry="15" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>

  <!-- Center vertical line -->
  <path d="M 100 15 Q 105 60 105 100 Q 105 140 100 185" stroke="#ffffff" stroke-width="2" fill="none" opacity="0.7"/>

  <!-- Side curves for 3D effect -->
  <path d="M 60 85 Q 65 100 60 115" stroke="#ffffff" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M 140 85 Q 135 100 140 115" stroke="#ffffff" stroke-width="1.5" fill="none" opacity="0.5"/>

  <!-- Subtle shadow at bottom -->
  <ellipse cx="100" cy="185" rx="50" ry="8" fill="#000000" opacity="0.15"/>
</svg>
